<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='utf-8' />
        <link rel="stylesheet" href="static/dropdown.css" />
        <link rel="stylesheet" href="static/slider.css" />
        <link rel="stylesheet" href="static/base.css" />
        <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.18/dayjs.min.js" integrity="sha512-FwNWaxyfy2XlEINoSnZh1JQ5TRRtGow0D6XcmAWmYCRgvqOUTnzCxPc9uF35u5ZEpirk1uhlPVA19tflhvnW1g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script>
			const COLORS = [
                {text: "black", bg: "pink"},
                {text: "black", bg: "violet"},
                {text: "white", bg: "magenta"},
                {text: "white", bg: "maroon"},
                {text: "white", bg: "crimson"},
                {text: "black", bg: "salmon"},
                {text: "black", bg: "coral"},
                {text: "black", bg: "orange"},
                {text: "black", bg: "sandybrown"},
                {text: "black", bg: "gold"},
                {text: "black", bg: "greenyellow"},
                {text: "black", bg: "palegreen"},
                {text: "black", bg: "lime"},
                {text: "black", bg: "skyblue"},
                {text: "white", bg: "green"},
                {text: "white", bg: "blue"},
                {text: "white", bg: "purple"},
                {text: "white", bg: "slateblue"},
                {text: "white", bg: "slategray"},
                {text: "white", bg: "olive"},
                {text: "white", bg: "saddlebrown"},
                {text: "white", bg: "brown"},
                {text: "black", bg: "rosybrown"},
                {text: "black", bg: "burlywood"},
                {text: "black", bg: "thistle"},
            ];

            const THEATERS = [
                "AMC Methuen",
                "AMC Boston Common",
                "Coolidge Corner",
                "Brattle Theater",
                "Somerville Theater",
                "AMC Tyngsboro",
                "AMC Causeway",
                "Apple Hooksett",
                "Apple Merrimack",
                "Showcase Randolph",
                "O'Neil Londonderry",
            ];

            var NEGATIVE_FILTER_FIELDS = {
                "Is Open Caption": "is_open_caption",
                "No A-List": "no_alist"
            };

            var GLOBAL_FILTER_FUNCS = {
                "Show Past": {
                    showtimeF: (s) => dayjs(s["start_time"]).isBefore(dayjs().startOf("day")),
                    movieF: (mi) => dayjs(mi["details"]["first"]).isBefore(dayjs().startOf("day")),
                    init: false
                }
            };


            function timeStr(date) {
                var hoursRaw = date.getHours() % 12;
                var hours = hoursRaw == 0 ? 12 : hoursRaw;
                var minutes = String(date.getMinutes()).padStart(2, "0");
                var period = date.getHours() < 12 ? "a" : "p";
                return `${hours}:${minutes}${period}`;
            }

            function showtimeToEvent(showtime) {
                var title = showtime["title"];
                if (showtime["format"] != "Standard") {
                    title = `[${showtime["format"]}] ${title}`
                }
                delete showtime["create_time"];

                return {
                    "title": title,
                    "start": showtime["start_time"],
                    "end": showtime["end_time"],
                    "extendedProps": {
                        "showtime": showtime
                    }
                }
            }

            function showtimesToEvents(showtimes) {
                return showtimes.map(showtimeToEvent);
            }


            function baseShowtimeToEventSource(title, events, displayInfo) {
                return {
                    "id": title,
                    "events": events,
                    "backgroundColor": displayInfo[title]["background_color"],
                    "textColor": displayInfo[title]["text_color"]
                }
            }

            function showtimeToEventSource(showtime, displayInfo) {
                return baseShowtimeToEventSource(showtime["title"], [showtimeToEvent(showtime)], displayInfo);
            }

            function showtimesToEventSources(showtimes) {
                var displayInfo = reloadDisplayInfo();
                var showtimesByTitle = Object.groupBy(showtimes, (evt) => evt["title"]);
                return Object.entries(showtimesByTitle).map(([title, showtimes]) => {
                    return baseShowtimeToEventSource(title, showtimesToEvents(showtimes), displayInfo);
                });
            }

            function request(method, path, bodyJson) {
                const url = `/${path}`;
                return fetch(url, {method: method, headers: {"Content-Type": "application/json"}, body: JSON.stringify(bodyJson)})
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error(`Response status: ${response.status}`);
                        }

                        if (response.headers.get("content-type") == "application/json") {
                            return response.json();
                        } else {
                            return response.text();
                        }
                    })
                    .catch(function(error) {
                        console.error(error.message);
                        return {};
                    });
            }

            function get(path) {
                return request("GET", path);
            }

            function post(path, bodyJson) {
                return request("POST", path, bodyJson);
            }

            function put(path, bodyJson) {
                return request("PUT", path, bodyJson);
            }

            function hideMovie(title) {
                return put(`movies/${encodeURIComponent(title)}/hide`);
            }

            function showMovie(title) {
                return put(`movies/${encodeURIComponent(title)}/show`);
            }

            function addAllToCalendar(calendar, filterShowtimesFunc) {
                var theater = selectedTheater();
                var startTime = calendar.formatIso(calendar.view.activeStart);
                var endTime = calendar.formatIso(calendar.view.activeEnd);
                return getShowtimes(theater, startTime, endTime)
                    .then(function(result) {
                        var displayInfo = reloadDisplayInfo();
                        var visibility = reloadVisibility();

                        var filteredShowtimes = applyShowtimeFilters(result["showtimes"], visibility);
                        return filteredShowtimes
                            .filter(filterShowtimesFunc)
                            .forEach((showtime) => {
                                var eventSource = calendar.getEventSourceById(showtime["title"]);
                                if (eventSource === null) {
                                    calendar.addEventSource(showtimeToEventSource(showtime, displayInfo));
                                } else {
                                    calendar.addEvent(showtimeToEvent(showtime), eventSource);
                                }
                            });
                    });
            }

            function getVisibility(theater, startTime, endTime) {
                return get(`showtimes/${encodeURIComponent(theater)}/${startTime}/${endTime}/visibility`);
            }

            function getShowtimes(theater, startTime, endTime) {
                return get(`showtimes/${encodeURIComponent(theater)}/${startTime}/${endTime}`);
            }

            function getSchedule(startTime, endTime) {
                return get(`schedule/${startTime}/${endTime}`);
            }

            function resetMovieList() {
                document.getElementById("shown-movies").innerHTML = "";
                document.getElementById("hidden-movies").innerHTML = "";
            }

            async function refreshTheatersLastUpdated() {
                return get("theaters/last-updated").then(function(result) {
                    var dropdownEl = document.getElementById("theater-dropdown");
                    Array.from(dropdownEl.querySelectorAll("[data-theater]")).forEach((theaterEl) => {
                        var theater = theaterEl.dataset.theater;
                        var timeEl = theaterEl.querySelector("[data-iso]");
                        var timestampStr = result["updates"][theater];
                        timeEl.dataset.iso = timestampStr;
                        timeEl.innerHTML = dayjs(timestampStr).format("ddd, MMM D @ HH:mm");
                    });
                });
            }

            function clearCalendar(calendar) {
                calendar.getEventSources().forEach((eventSource, i) => eventSource.remove());
                calendar.getEvents().forEach((event, i) => event.remove());
            }

            function selectedTheater() {
                var rawTheater = document.getElementById("theater-selected").dataset.theater;
                return rawTheater === undefined || rawTheater == null ? "AMC Methuen" : rawTheater;
            }

            function toggleIsChecked(toggleEl) {
                if (typeof toggleEl === "string") {
                    toggleEl = document.getElementById(toggleEl);
                }
                return toggleEl.querySelector("label input").checked;
            }

            function createToggleSlider(showtimesCalendar, id, toggleFilterShowtimesFunc, adjustOtherToggles) {
                var adjustOtherToggles = adjustOtherToggles === undefined ? true : adjustOtherToggles;
                var toggleEl = document.getElementById(id);
                toggleEl.addEventListener("change", function (e) {
                    var moviesInfo = reloadMoviesInfo();
                    if (toggleIsChecked(toggleEl)) {
                        addAllToCalendar(showtimesCalendar, toggleFilterShowtimesFunc);
                    } else {
                        showtimesCalendar.getEvents().forEach((event) => {
                            if (toggleFilterShowtimesFunc(event.extendedProps["showtime"])) {
                                event.remove();
                            }
                        });
                        if (adjustOtherToggles) {
                            adjustFilterChecked(showtimesCalendar);
                        }
                    }
                });
                return toggleEl;
            }

            function createToggleElement(id, label, initialChecked) {
                var initialChecked = initialChecked === undefined ? true : initialChecked;
                var checkboxEl = Object.assign(document.createElement("input"), {type: "checkbox", checked: initialChecked});
                var sliderEl = Object.assign(document.createElement("span"), {className: "slider round"});
                var switchEl = Object.assign(document.createElement("label"), {className: "switch"});
                switchEl.style.verticalAlign = "middle";
                switchEl.appendChild(checkboxEl);
                switchEl.appendChild(sliderEl);

                var labelEl = Object.assign(document.createElement("label"), {innerHTML: label});
                Object.assign(labelEl.style, {display: "inline-block", verticalAlign: "middle", marginLeft: "4px", width: "60%"});

                var toggleEl = Object.assign(document.createElement("div"), {id: id});
                toggleEl.dataset.label = label;
                toggleEl.appendChild(switchEl);
                toggleEl.appendChild(labelEl);

                return toggleEl;
            }

            function getMovieListEntries(rootEl) {
                if (typeof rootEl === "string") {
                    rootEl = document.getElementById(rootEl);
                }
                return Array.from(rootEl.querySelectorAll("[data-title]"));
            }

            function reloadMoviesInfo() {
                var movieList = getMovieListEntries("movie-list");

                return Object.fromEntries(movieList.map((el) => {
                    var formats = el.dataset.formats.split(",");
                    var display = {visible: el.dataset.visible === "true", background_color: el.dataset.bgColor, text_color: el.dataset.textColor};
                    var details = {
                        noAList: el.dataset.noAList,
                        isOpenCaption: el.dataset.isOpenCaption,
                        first: el.dataset.first,
                        last: el.dataset.last,
                        formats,
                        ...Object.fromEntries(formats.map((fmt) => [strToDatasetId(fmt),  el.dataset[strToDatasetId(fmt)]]))
                    }

                    return [el.dataset.title, {display, details}];
                }));
            }

            function reloadDisplayInfo() {
                var moviesInfo = reloadMoviesInfo();
                return Object.fromEntries(Object.entries(moviesInfo).map(([title, info]) => [title, info["display"]]));
            }

            function reloadVisibility() {
                var moviesInfo = reloadMoviesInfo();
                return Object.fromEntries(Object.entries(moviesInfo).map(([title, info]) => [title, info["display"]["visible"]]));
            }

            function toggleId(label) {
                return `${label.toLowerCase().replace(" ", "-")}-toggle`;
            }

            function getFilters(moviesInfo) {
                var newFormats = Array.from(new Set(Object.values(moviesInfo).map((info) => info["details"]["formats"]).flat()));
                var oldFormats = Array.from(document.getElementById("format-filter-toggles").children).map((el) => el.dataset.label);
                var formatFilters = newFormats.concat(oldFormats).toSorted().map((fmt) => {
                    return {
                        label: fmt,
                        filterShowtimeF: (s) => s["format"] === fmt,
                        filterMovieF: (mi) => mi["details"][strToDatasetId(fmt)] === "true"
                    };
                });
                var negativeFilters = Object.entries(NEGATIVE_FILTER_FIELDS).map(([label, field]) => {
                    return {
                        label: label,
                        filterShowtimeF: (s) => s[field],
                        filterMovieF: (mi) => mi["details"][strToDatasetId(label)] === "true"
                    };
                });
                var globalFilters = Object.entries(GLOBAL_FILTER_FUNCS).map(([label, {showtimeF, movieF, init}]) => {
                    return {
                        label: label,
                        filterShowtimeF: showtimeF,
                        filterMovieF: movieF,
                        init: init
                    };
                });

                return {globalFilters, formatFilters, negativeFilters};
            }

            function applyRawShowtimeFilters(showtimes, visibility) {
                var negativeFilters = Array.from(document.getElementById("negative-filter-toggles").children)
                    .filter((el) => !toggleIsChecked(el.id))
                    .map((el) => NEGATIVE_FILTER_FIELDS[el.dataset.label]);
                var enabledFormats = Array.from(document.getElementById("format-filter-toggles").children)
                    .filter((el) => toggleIsChecked(el.id))
                    .map((el) => el.dataset.label);

                var globalFilters = Array.from(document.getElementById("global-filter-toggles").children)
                    .filter((el) => !toggleIsChecked(el.id))
                    .map((el) => (s) => {
                        var filterDef = GLOBAL_FILTER_FUNCS[el.dataset.label];
                        return filterDef["showtimeF"](s) === filterDef["init"];
                    });
                return showtimes.filter((showtime) => {
                    return visibility[showtime["title"]]
                        && !negativeFilters.some((field) => showtime[field])
                        && enabledFormats.includes(showtime["format"])
                        && globalFilters.every((filterShowtimesFunc) => filterShowtimesFunc(showtime));
                });
            }

            function applyShowtimeFilters(showtimes, visibility) {
                return toggleIsChecked("disable-filter-toggle") ? showtimes : applyRawShowtimeFilters(showtimes, visibility);
            }

            function adjustFilterChecked(showtimesCalendar) {
                var moviesInfo = reloadMoviesInfo();
                var {formatFilters, negativeFilters} = getFilters(moviesInfo);

                var filters = formatFilters.concat(negativeFilters);
                filters.forEach(({label, filterShowtimeF}) => {
                    var matchingShowtimes = showtimesCalendar.getEvents().filter((e) => filterShowtimeF(e.extendedProps["showtime"]));
                    var id = toggleId(label);
                    var checkboxEl = document.getElementById(id).querySelector(".switch input");
                    checkboxEl.checked = matchingShowtimes.length > 0;
                });
            }

            function updateEnabledFilters() {
                var moviesInfo = reloadMoviesInfo();
                var {formatFilters, negativeFilters} = getFilters(moviesInfo);

                var filters = formatFilters.concat(negativeFilters);
                filters.forEach(({label, filterMovieF}) => {
                    var switchEl = document.getElementById(toggleId(label)).querySelector(".switch");
                    var filteredMovies = Object.values(moviesInfo).filter((info) => filterMovieF(info) && info["display"]["visible"])
                    if (Object.keys(moviesInfo).length > 0 && filteredMovies.length > 0) {
                        switchEl.classList.remove("disabled");
                    } else {
                        switchEl.classList.add("disabled");
                    }
                });
            }

            function createTogglesByType(parentId, filterDefinitions, showtimesCalendar, listingCalendar, moviesInfo, adjustOtherToggles) {
                var parentEl = document.getElementById(parentId);
                filterDefinitions.forEach(({label, filterShowtimeF, filterMovieF, init}) => {
                    var id = toggleId(label);
                    var toggleEl = document.getElementById(id);
                    if (toggleEl === null) {
                        toggleEl = createToggleElement(id, label, init);

                        var openListingButton = createMovieListOpenListingButton(showtimesCalendar, listingCalendar, filterShowtimeF);
                        toggleEl.appendChild(openListingButton);

                        parentEl.appendChild(toggleEl);

                        createToggleSlider(showtimesCalendar, id, filterShowtimeF, adjustOtherToggles);
                    }

                    var filteredMovies = Object.values(moviesInfo).filter((info) => filterMovieF(info));
                    if (Object.keys(moviesInfo).length > 0 && filteredMovies.length > 0) {
                        toggleEl.style.removeProperty("display");
                    } else {
                        toggleEl.style.display = "none";
                    }
                });
            }

            function applyDisableFiltersToggle() {
                var switchEls = document.getElementById("filter-toggles").querySelectorAll(".switch");
                var movieEls = getMovieListEntries("movie-list");
                if (toggleIsChecked("disable-filter-toggle")) {
                    switchEls.forEach((switchEl) => switchEl.classList.add("disabled"));
                    movieEls.forEach((movieEl) => movieEl.classList.add("disabled"));
                } else {
                    switchEls.forEach((switchEl) => switchEl.classList.remove("disabled"));
                    movieEls.forEach((movieEl) => movieEl.classList.remove("disabled"));
                    updateEnabledFilters();
                }
            }

            function createDisableFiltersToggle(showtimesCalendar) {
                var id = "disable-filter-toggle";
                var label = "Disable Filters";
                var initialChecked = false;
                var filterShowtimeF = function(showtime) {
                    var visibility = reloadVisibility();
                    return applyRawShowtimeFilters([showtime], visibility).length === 0;
                };

                var toggleEl = document.getElementById(id);
                if (toggleEl.innerHTML === "") {
                    toggleEl.innerHTML = createToggleElement(id, label, initialChecked).innerHTML;
                    toggleEl.addEventListener("change", applyDisableFiltersToggle);
                    createToggleSlider(showtimesCalendar, id, filterShowtimeF, false);
                }
            }

            function createFilters(showtimesCalendar, listingCalendar) {
                var moviesInfo = reloadMoviesInfo();
                var {globalFilters, formatFilters, negativeFilters} = getFilters(moviesInfo);

                createTogglesByType("global-filter-toggles", globalFilters, showtimesCalendar, listingCalendar, moviesInfo, false);
                createTogglesByType("format-filter-toggles", formatFilters, showtimesCalendar, listingCalendar, moviesInfo);
                createTogglesByType("negative-filter-toggles", negativeFilters, showtimesCalendar, listingCalendar, moviesInfo);
                createDisableFiltersToggle(showtimesCalendar);
            }

            function openListingClickHandler(event, showtimesCalendar, listingCalendar, showtimeFilter) {
                event.stopPropagation();

                var startStr = showtimesCalendar.formatIso(showtimesCalendar.view.currentStart);
                var endStr = showtimesCalendar.formatIso(showtimesCalendar.view.currentEnd);
                var theater = selectedTheater();
                var title = event.currentTarget.parentNode.dataset.movieListEntry;

                var showtimeFilter = showtimeFilter === undefined ? (s) => s["title"] === title : showtimeFilter;

                listingCalendar.gotoDate(startStr);
                getShowtimes(theater, startStr, endStr)
                    .then((result) => result["showtimes"].filter(showtimeFilter))
                    .then(function(showtimes) {
                        showtimesToEventSources(showtimes).forEach((eventSource) =>
                            listingCalendar.addEventSource(eventSource)
                        );

                        listingCalendar.render();
                    });
            }

            function createMovieListOpenListingButton(showtimesCalendar, listingCalendar, showtimeFilter) {
                var openListingEl = document.createElement('button');
                openListingEl.style.cursor = "pointer";
                openListingEl.style.backgroundColor = "transparent";
                openListingEl.style.borderWidth = "1px";
                openListingEl.innerHTML = "&#x1f4c5";
                openListingEl.style.maxHeight = "21px";
                openListingEl.popoverTargetElement = document.getElementById("movie-showtime-listing");
                openListingEl.addEventListener("click", (e) => {
                    return openListingClickHandler(e, showtimesCalendar, listingCalendar, showtimeFilter)
                });

                if (showtimeFilter === undefined) {
                    openListingEl.style.position = "absolute";
                    openListingEl.style.top = "50%";
                    openListingEl.style.right = "0px";
                    openListingEl.style.transform = "translate(-50%, -50%)";
                } else {
                    openListingEl.style.marginRight = "10px";
                    openListingEl.style.float = "right";
                }
                return openListingEl;
            }

            function createMovieListTitleEl(title) {
                var titleEl = document.createElement("div");
                titleEl.innerHTML = title;
                titleEl.style.flex = "80%";
                return titleEl;
            }

            function movieListClickHandler(showtimesCalendar, listingCalendar, entry, bgColor, textColor) {
                function insertSortedChild(parentId, entry) {
                    var parentEl = document.getElementById(parentId);
                    var entryTitle = getMovieListEntries(entry)[0].dataset.title;
                    var nextEntry = Array.from(parentEl.children).find((el) => getMovieListEntries(el)[0].dataset.title > entryTitle);
                    if (nextEntry === undefined) {
                        parentEl.appendChild(entry);
                    } else {
                        nextEntry.before(entry);
                    }
                }

                var title = entry.dataset.title;
                if (entry.dataset.visible === "false") {
                    entry.style.background = bgColor;
                    entry.nextSibling.style.background = bgColor;
                    entry.style.color = textColor;
                    entry.dataset.visible = "true";

                    insertSortedChild("shown-movies", entry.parentElement);

                    showMovie(title);
                    addAllToCalendar(showtimesCalendar, (showtime) => showtime["title"] === title).then(function() {
                        updateEnabledFilters();
                    });
                } else if (entry.dataset.visible === "true") {
                    entry.style.background = "white";
                    entry.nextSibling.style.background = "white";
                    entry.style.color = bgColor;
                    entry.dataset.visible = "false";

                    var titleEventSource = showtimesCalendar.getEventSourceById(title);
                    if (titleEventSource !== null) {
                        titleEventSource.remove();
                    }

                    insertSortedChild("hidden-movies", entry.parentElement);
                    hideMovie(title);
                    updateEnabledFilters();
                }
            }

            function strToDatasetId(str) {
                return str.replace("-", " ").split(" ").map((w, i) => i === 0 ? w.toLowerCase() : (w.at(0).toUpperCase() + w.slice(1).toLowerCase())).join("");
            }

            function createMovieListItemEl(showtimesCalendar, listingCalendar, details) {
                var display = details["display"];

                var entry = document.createElement('div');
                entry.dataset.title = details["title"];
                entry.dataset.noAList = details["noAList"];
                entry.dataset.isOpenCaption = details["isOpenCaption"];
                entry.dataset.formats = details["formats"].toSorted().join(",");
                details["formats"].forEach((fmtLabel) => {
                    var datasetFmt = strToDatasetId(fmtLabel);
                    entry.dataset[datasetFmt] = "true";
                });
                entry.dataset.first = details["first"];
                entry.dataset.last = details["last"];

                entry.style.display = "flex";
                entry.style.alignItems = "center";
                entry.style.border = `thin solid ${display["bgColor"]}`;
                entry.style.borderRadius = "5px";
                entry.style.margin = "5px";
                entry.style.padding = "5px 50px 5px 5px";
                entry.style.cursor = "pointer";
                entry.dataset.visible = display["visible"].toString();
                entry.dataset.bgColor = display["bgColor"];
                entry.dataset.textColor = display["textColor"];
                if (display["visible"]) {
                    entry.style.background = display["bgColor"];
                    entry.style.color = display["textColor"];
                } else {
                    entry.style.background = "white";
                    entry.style.color = display["bgColor"];
                }

                entry.addEventListener("click", (e) => {
                    return movieListClickHandler(showtimesCalendar, listingCalendar, entry, display["bgColor"], display["textColor"])
                });
                return entry;
            }

            function createMovieListParentEl(title) {
                var parent = document.createElement('div');
                parent.style.position = "relative";
                parent.dataset.movieListEntry = title;
                return parent;
            }

            function createMovieListEntry(showtimesCalendar, listingCalendar, details) {
                var entry = createMovieListItemEl(showtimesCalendar, listingCalendar, details);
                entry.appendChild(createMovieListTitleEl(details["title"]));

                var buttonEl = createMovieListOpenListingButton(showtimesCalendar, listingCalendar);
                buttonEl.style.background = details["display"]["visible"] ? details["display"]["bgColor"] : "white";

                var parent = createMovieListParentEl(details["title"]);
                parent.appendChild(entry);
                parent.appendChild(buttonEl);

                var sublistId = entry.dataset.visible == "true" ? "shown-movies" : "hidden-movies";
                document.getElementById(sublistId).appendChild(parent);
            }

            function showtimesToDetails(showtimes, visibility) {
                var showtimesByTitle = Object.groupBy(showtimes, (evt) => evt["title"]);
                return Object.entries(showtimesByTitle).toSorted()
                    .map(([title, titleShowtimes], i) => {
                        var {text, bg} = COLORS[i % COLORS.length];
                        var sortedTimes = titleShowtimes.map((s) => s["start_time"]).toSorted();
                        return {
                            title,
                            formats: Array.from(new Set(titleShowtimes.map((s) => s["format"]))),
                            noAList: titleShowtimes.some((s) => s["no_alist"]),
                            isOpenCaption: titleShowtimes.some((s) => s["is_open_caption"]),
                            first: sortedTimes[0],
                            last: sortedTimes.at(-1),
                            display: {
                                visible: visibility[title],
                                bgColor: bg,
                                textColor: text
                            }
                        };
                    });
            }

            function loadShowtimesCallback(showtimes, visibility, showtimesCalendar, listingCalendar, scheduleCalendar) {
                resetMovieList();
                refreshTheatersLastUpdated();

                showtimesToDetails(showtimes, visibility).forEach((details) => {
                    createMovieListEntry(showtimesCalendar, listingCalendar, details);
                });

                createFilters(showtimesCalendar, listingCalendar);
                updateEnabledFilters();

                if (toggleIsChecked("disable-filter-toggle")) {
                    applyDisableFiltersToggle();
                }

                var filteredShowtimes = applyShowtimeFilters(showtimes, visibility);
                showtimesToEventSources(filteredShowtimes).forEach((eventSource) => {
                    showtimesCalendar.addEventSource(eventSource)
                });

                var minStartHour = showtimes.map((s) => dayjs(s["start_time"]).hour()).toSorted()[0]
                if (minStartHour !== undefined) {
                    showtimesCalendar.setOption('slotMinTime', `${minStartHour}:00:00`);
                    scheduleCalendar.setOption('slotMinTime', `${minStartHour}:00:00`);
                }

                showtimesCalendar.render();
            }

            function getListingConfig(showtimesCalendar) {
                var listingView = "";
                var titleFormat = false;
                var listDayFormat = false;
                switch (showtimesCalendar.view.type) {
                    case "dayGridMonth":
                        listingView = "listMonth";
                        titleFormat = {month: 'long', year: 'numeric'};
                        listDayFormat = {weekday: 'long', month: 'long', day: 'numeric'};
                        break;
                    case "timeGridWeek":
                        listingView = "listWeek";
                        titleFormat = {month: 'long', day: 'numeric', year: 'numeric'};
                        listDayFormat = {weekday: 'long', month: 'long', day: 'numeric'};
                        break;
                    case "timeGridDay":
                        listingView = "listDay";
                        titleFormat = {weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'};
                        break;
                    default: throw new Error(`Unrecognized main calendar view type: ${showtimesCalendar.view.type}`);
                }
                return {view: listingView, title: titleFormat, day: listDayFormat};
            }

            function renderScheduleCalendar(scheduleCalendar, scheduleCalendarEl, showtimesCalendar) {
                var listingConfig = getListingConfig(showtimesCalendar);
                if (scheduleCalendar.view.type !== listingConfig["view"]) {
                    scheduleCalendar.changeView(listingConfig["view"]);
                    scheduleCalendar.setOption("listDayFormat", listingConfig["day"]);
                }

                var minStartHour = showtimesCalendar.getEvents().map((s) => s.start.getHours()).toSorted()[0]
                if (minStartHour !== undefined) {
                    scheduleCalendar.setOption('slotMinTime', `${minStartHour}:00:00`);
                }

                scheduleCalendar.gotoDate(showtimesCalendar.view.currentStart);

                var startStr = scheduleCalendar.formatIso(showtimesCalendar.view.currentStart);
                var endStr = scheduleCalendar.formatIso(showtimesCalendar.view.currentEnd);

                getSchedule(startStr, endStr).then((result) => {
                    clearCalendar(scheduleCalendar);
                    showtimesToEvents(result["schedule"]).forEach((event) => {
                        scheduleCalendar.addEvent(event);
                    });
                    scheduleCalendar.render();
                });
            }

            function displayListingCalendar(event, showtimesCalendar, listingCalendar) {
                if (event.newState === "open") {
                    var listingConfig = getListingConfig(showtimesCalendar);
                    listingCalendar.setOption("titleFormat", listingConfig["title"]);
                    listingCalendar.setOption("listDayFormat", listingConfig["day"]);

                    var startStr = showtimesCalendar.formatIso(showtimesCalendar.view.currentStart);
                    var endStr = showtimesCalendar.formatIso(showtimesCalendar.view.currentEnd);
                    listingCalendar.changeView(listingConfig["view"], {"start": startStr, "end": endStr});
                    listingCalendar.getEventSources().forEach((eventSource, i) => eventSource.remove());
                    listingCalendar.render();
                }
            }

            function addToSchedule(event, scheduleCalendar) {
                var srcShowtime = event.extendedProps["showtime"];
                delete srcShowtime["create_time"];
                var isScheduled = scheduleCalendar.getEvents().some((e) => {
                    var evtShowtime = e.extendedProps["showtime"];
                    return Object.keys(srcShowtime).every((key) => srcShowtime[key] === evtShowtime[key]);
                });
                if (!isScheduled) {
                    scheduleCalendar.addEvent(event);
                    post("schedule/new-showtime", event.extendedProps["showtime"]);
                }
            }

            function openShowtimePopup(showtime) {
                var showtimeDetails = showtime.extendedProps["showtime"];

                var startDisplayStr = timeStr(showtime.start);
                var endDisplayStr = showtime.end === null ? "???" : timeStr(showtime.end);

                var headerEl = document.createElement("h2");
                headerEl.innerHTML = showtimeDetails["title"];
                headerEl.style.margin = "0px 0px 5px 0px";

                var timeEl = document.createElement("div");
                timeEl.innerHTML = `<i>${startDisplayStr} - ${endDisplayStr}</i>`;

                var formatStr = showtimeDetails["format"];
                if (showtimeDetails["is_open_caption"]) {
                    formatStr += ", Open Caption";
                }
                if (showtimeDetails["no_alist"]) {
                    formatStr += ", No A-List";
                }

                var detailsEl = document.createElement("div");
                detailsEl.innerHTML = formatStr;

                var showtimeDetailsPopover = document.getElementById("showtime-details");
                showtimeDetailsPopover.innerHTML = "";
                showtimeDetailsPopover.appendChild(headerEl);
                showtimeDetailsPopover.appendChild(timeEl);
                showtimeDetailsPopover.appendChild(document.createElement("hr"));
                showtimeDetailsPopover.appendChild(detailsEl);
                showtimeDetailsPopover.showPopover();
            }

            function theaterClickHandler(event, showtimesCalendar, listingCalendar, scheduleCalendar) {
                var selected = event.target.closest(".dropdown-item");
                var theater = selected.dataset.theater;
                const button = document.getElementById("theater-selected");
                button.innerHTML = selected.innerHTML;
                button.dataset.theater = theater;

                // Visual feedback
                button.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    button.style.transform = '';
                }, 300);

                var startStr = showtimesCalendar.formatIso(showtimesCalendar.view.activeStart);
                var endStr = showtimesCalendar.formatIso(showtimesCalendar.view.activeEnd);
                resetMovieList();
                clearCalendar(showtimesCalendar);
                Promise.all([getShowtimes(theater, startStr, endStr), getVisibility(theater, startStr, endStr)])
                    .then(([showtimesResult, visibilityResult]) => {
                        loadShowtimesCallback(showtimesResult["showtimes"], visibilityResult["visibility"], showtimesCalendar, listingCalendar, scheduleCalendar);
                    });
            }

            function createTheaterSelectorEl(theater) {
                var nameEl = Object.assign(document.createElement("div"), {innerHTML: theater});

                var lastUpdatedTimeEl = document.createElement("span");
                lastUpdatedTimeEl.dataset.iso = "";

                var lastUpdatedEl = Object.assign(document.createElement("div"), {innerHTML: "Updated "});
                Object.assign(lastUpdatedEl.style, {color: "gray", fontSize: "10px"});
                lastUpdatedEl.appendChild(lastUpdatedTimeEl);

                var dropdownItemEl = Object.assign(document.createElement("a"), {href: "#", className: "dropdown-item"});
                dropdownItemEl.dataset.theater = theater;
                dropdownItemEl.appendChild(nameEl);
                dropdownItemEl.appendChild(lastUpdatedEl);

                var theaterOptionsEl = document.getElementById("theater-options");
                theaterOptionsEl.appendChild(dropdownItemEl);
            }

            function showTheatersOnHover() {
                var dropdownEl = document.getElementById("theater-dropdown");
                var dropdownMenuEl = document.getElementById("theater-options");
                dropdownEl.addEventListener("mouseenter", function(e) {
                    dropdownMenuEl.classList.add("dropdown-menu-hover");
                });
                dropdownEl.addEventListener("mouseleave", function(e) {
                    dropdownMenuEl.classList.remove("dropdown-menu-hover");
                });

                var dropdownItems = dropdownMenuEl.querySelectorAll(".dropdown-item");
                dropdownItems.forEach((dropdownItem) => {
                    dropdownItem.addEventListener("mouseenter", function(e) {
                        dropdownItem.classList.add("dropdown-item-hover");
                    });
                });
                dropdownItems.forEach((dropdownItem) => {
                    dropdownItem.addEventListener("mouseleave", function(e) {
                        dropdownItem.classList.remove("dropdown-item-hover");
                    });
                    dropdownItem.addEventListener("click", function(e) {
                        dropdownMenuEl.classList.remove("dropdown-menu-hover");
                    });
                });
            }


            document.addEventListener('DOMContentLoaded', function() {
                THEATERS.forEach(createTheaterSelectorEl);
                var theaterSelectedEl = document.getElementById("theater-selected");
                var defaultTheaterEl = document.getElementById("theater-options").firstChild;
                theaterSelectedEl.innerHTML = defaultTheaterEl.innerHTML;
                theaterSelectedEl.dataset.theater = defaultTheaterEl.dataset.theater;

                var showtimesCalendarEl = document.getElementById('showtimes-calendar');
                var showtimesCalendar = new FullCalendar.Calendar(showtimesCalendarEl, {
                    initialView: 'dayGridMonth',
                    contentHeight: "auto",
                    nextDayThreshold: '2:00:00',
                    allDaySlot: false,
                    slotMinTime: '09:00:00',
                    fixedWeekCount: false,
                    navLinks: true,
                    headerToolbar: {
                        left: 'prev,next',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,timeGridDay'
                    },
                    datesSet: (dateInfo) => {
                        var endStr = showtimesCalendar.formatIso(dateInfo.end);
                        var startStr = showtimesCalendar.formatIso(dateInfo.start);
                        var theater = selectedTheater();

                        resetMovieList();
                        clearCalendar(showtimesCalendar);
                        Promise.all([getShowtimes(theater, startStr, endStr), getVisibility(theater, startStr, endStr)])
                            .then(([showtimesResult, visibilityResult]) => {
                                loadShowtimesCallback(showtimesResult["showtimes"], visibilityResult["visibility"], showtimesCalendar, listingCalendar, scheduleCalendar);
                                renderScheduleCalendar(scheduleCalendar, scheduleCalendarEl, showtimesCalendar);
                            });
                    },
                    eventClick: (clickInfo) => {
                        if (clickInfo.jsEvent.ctrlKey) {
                            addToSchedule(clickInfo.event, scheduleCalendar);
                        } else {
                            openShowtimePopup(clickInfo.event);
                        }
                    }
                });
                showtimesCalendar.render();

                var scheduleCalendarEl = document.getElementById('schedule-calendar');
                var scheduleCalendar = new FullCalendar.Calendar(scheduleCalendarEl, {
                    initialView: 'listMonth',
                    contentHeight: "auto",
                    nextDayThreshold: '2:00:00',
                    allDaySlot: false,
                    slotMinTime: '09:00:00',
                    listDaySideFormat: false,
                    customButtons: {
                        exportButton: {
                            text: 'Export ICS',
                            click: function() {
                                var body = {
                                    showtimes: scheduleCalendar.getEvents()
                                        .filter((e) => scheduleCalendar.view.activeStart <= e.start && scheduleCalendar.view.activeEnd >= e.start)
                                        .map((e) => e.extendedProps["showtime"])
                                }
                                post(`export-ics`, body).then((result) => {
                                    window.location = "data:text/calendar," + encodeURIComponent(result);
                                });
                            }
                        },
                        clearButton: {
                            text: "Clear",
                            click: function(clickInfo) {
                                var startTime = scheduleCalendar.formatIso(scheduleCalendar.view.activeStart);
                                var endTime = scheduleCalendar.formatIso(scheduleCalendar.view.activeEnd);
                                post(`schedule/${startTime}/${endTime}/clear`);

                                scheduleCalendar.getEvents()
                                    .filter((e) => scheduleCalendar.view.activeStart <= e.start && scheduleCalendar.view.activeEnd >= e.start)
                                    .forEach((e) => e.remove());
                            }
                        }
                    },
                    headerToolbar: {
                        left: false,
                        center: 'exportButton',
                        right: "clearButton"
                    },
                    eventClick: function(clickInfo) {
                        if (clickInfo.jsEvent.ctrlKey) {
                            clickInfo.event.remove();
                            post("schedule/remove-showtime", clickInfo.event.extendedProps["showtime"]);
                        } else {
                            openShowtimePopup(clickInfo.event);
                        }
                    }
                });
                scheduleCalendar.render();

                var listingCalendarEl = document.getElementById("listing-calendar");
                var listingCalendar = new FullCalendar.Calendar(listingCalendarEl, {
                    initialView: 'listWeek',
                    contentHeight: "auto",
                    allDaySlot: false,
                    headerToolbar: {
                        left: '',
                        center: 'title',
                        right: ''
                    },
                    listDayFormat: {weekday: 'long', month: 'long', day: 'numeric'},
                    listDaySideFormat: false,
                    eventClick: (clickInfo) => {
                        if (clickInfo.jsEvent.ctrlKey) {
                            addToSchedule(clickInfo.event, scheduleCalendar);
                        } else {
                            openShowtimePopup(clickInfo.event);
                        }
                    }
                });

                document.getElementById("movie-showtime-listing").addEventListener("beforetoggle", (event) => {
                    displayListingCalendar(event, showtimesCalendar, listingCalendar);
                });

                document.querySelectorAll("#theater-options .dropdown-item").forEach(item => {
                    item.addEventListener("click", (e) => {
                        theaterClickHandler(e, showtimesCalendar, listingCalendar, scheduleCalendar);
                    });
                });

                showTheatersOnHover();
            });
        </script>
    </head>
    <body style="overflow: hidden;">
        <div popover id="showtime-details" style="width: 15%; height: 40%; padding: 10px;"></div>
        <div popover id="movie-showtime-listing" style="width: 25%; height: 65%;">
            <div id='listing-calendar'></div>
        </div>
        <div style="display: flex;">
            <div style="flex: 10%">
                <div style="height: 98vh; overflow-y: scroll; overflow-x: hidden; scrollbar-width: none; margin-right: 25px">
                    <div id="theater-dropdown" class="dropdown" style="margin-top: 20px;">
                        <button id="theater-selected" class="dropdown-toggle"></button>
                        <div id="theater-options" class="dropdown-menu"></div>
                    </div>
                    <hr />
                    <div id="disable-filter-toggle" data-label="Disable Filters"></div>
                    <div id="filter-toggles">
                        <div id="global-filter-toggles"></div>
                        <hr />
                        <div id="negative-filter-toggles"></div>
                        <div id="format-filter-toggles"></div>
                    </div>
                    <hr />
                    <div id="movie-list">
                        <div id="shown-movies"></div>
                        <div id="hidden-movies"></div>
                    </div>
                </div>
            </div>
            <div style="flex: 90%">
                <div style="display: flex;">
                    <div style="flex: 83%; padding-right: 50px;">
                        <div style="height: 98vh; overflow-y: scroll; scrollbar-width: none">
                            <div id='showtimes-calendar'></div>
                        </div>
                    </div>
                    <div style="flex: 17%; padding-right: 10px;">
                        <div style="height: 98vh; overflow-y: scroll; scrollbar-width: none">
                            <div id='schedule-calendar'></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
